{% extends 'base.html' %}

{% block content %}

<h2>Settings</h2>

<div style="margin-bottom: 30px;">
    <h3>Theme</h3>
    <form method="post" action="{% url 'set_theme' %}">
        {% csrf_token %}
        <div style="margin-bottom: 15px;">
            <label style="display: flex; align-items: center; gap: 10px; font-size: var(--font-md);">
                <input type="radio" name="theme" value="scifi" {% if request.user.theme_preference == 'scifi' or not request.user.theme_preference %}checked{% endif %} onchange="this.form.submit()">
                <span>Sci-Fi</span>
            </label>
        </div>
        <div style="margin-bottom: 15px;">
            <label style="display: flex; align-items: center; gap: 10px; font-size: var(--font-md);">
                <input type="radio" name="theme" value="retro" {% if request.user.theme_preference == 'retro' %}checked{% endif %} onchange="this.form.submit()">
                <span>Retro</span>
            </label>
        </div>
    </form>
</div>

<p><a href="/accounts/password_change/">Change Password</a></p>
<form method="post" action="{% url 'logout' %}">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">
        Logout
    </button>
</form>

{% endblock %}
